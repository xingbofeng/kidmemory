# KidMemory API 错误码定义
# 此文件记录所有错误码的定义和说明

# 成功
0:
  code: 0
  name: SUCCESS
  category: success
  description: API 调用成功

# 通用错误 (10000-10999)
10000:
  code: 10000
  name: UNKNOWN_ERROR
  category: general
  description: 未知错误

10001:
  code: 10001
  name: NOT_FOUND
  category: general
  description: 资源不存在

10002:
  code: 10002
  name: METHOD_NOT_ALLOWED
  category: general
  description: HTTP 方法不允许

10003:
  code: 10003
  name: SERVICE_UNAVAILABLE
  category: general
  description: 服务不可用

# 鉴权 (11000-11999)
11000:
  code: 11000
  name: UNAUTHORIZED
  category: auth
  description: 未授权

11001:
  code: 11001
  name: FORBIDDEN
  category: auth
  description: 禁止访问

11002:
  code: 11002
  name: TOKEN_EXPIRED
  category: auth
  description: Token 已过期

11003:
  code: 11003
  name: TOKEN_INVALID
  category: auth
  description: Token 无效

# 参数校验 (12000-12999)
12000:
  code: 12000
  name: INVALID_PARAMS
  category: validation
  description: 参数校验失败

12001:
  code: 12001
  name: MISSING_REQUIRED_FIELD
  category: validation
