openapi: 3.0.0
paths:
  /health:
    get:
      operationId: HealthController_getHealth
      parameters: []
      responses:
        "200":
          description: Service is healthy
      summary: Health check endpoint
      tags: &a1
        - health
  /health/ready:
    get:
      operationId: HealthController_getReadiness
      parameters: []
      responses:
        "200":
          description: Service is ready
      summary: Readiness check endpoint
      tags: *a1
  /config/status:
    get:
      operationId: ConfigController_getStatus
      parameters: []
      responses:
        "200":
          description: Configuration status
      summary: Get configuration status
      tags:
        - config
  /devices/register:
    post:
      operationId: DevicesController_register
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceRequestDto"
      responses:
        "200":
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponseDto"
        "400":
          description: Invalid request
      summary: Register a device (idempotent by machineId)
      tags: &a2
        - devices
  /devices/{id}/heartbeat:
    put:
      operationId: DevicesController_heartbeat
      parameters: []
      responses:
        "200":
          description: Heartbeat updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponseDto"
        "404":
          description: Device not found
      summary: Update device heartbeat
      tags: *a2
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /devices/{id}:
    get:
      operationId: DevicesController_getDevice
      parameters: []
      responses:
        "200":
          description: Device found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponseDto"
        "404":
          description: Device not found
      summary: Get device by ID
      tags: *a2
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /upload-items/pending-sync:
    get:
      operationId: UploadItemsController_getPendingSync
      parameters:
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            type: number
        - name: limit
          required: false
          in: query
          description: Maximum items to return
          schema:
            type: number
        - name: deviceId
          required: false
          in: query
          description: Filter by device ID
          schema: {}
      responses:
        "200":
          description: Pending items retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadItemResponseDto"
      summary: Get pending sync upload items
      tags: &a3
        - upload-items
  /upload-items/{id}/sync-status:
    put:
      operationId: UploadItemsController_updateSyncStatus
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSyncStatusRequestDto"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadItemResponseDto"
        "400":
          description: Invalid status transition
        "404":
          description: Item not found
      summary: Update upload item sync status
      tags: *a3
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/direct-upload/sessions/{sessionId}/config:
    get:
      operationId: WebCompanionController_getDirectUploadConfig
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectUploadConfigResponseDto"
      summary: Get direct upload config for trusted upload session
      tags: &a4
        - web-companion
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/sessions/{sessionId}:
    get:
      operationId: WebCompanionController_getSessionSummary
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSummaryResponseDto"
      summary: Get trusted upload session summary
      tags: *a4
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/sessions/{sessionId}/items:
    post:
      operationId: WebCompanionController_createUploadItems
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadItemsRequestDto"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUploadItemsResponseDto"
      summary: Create upload items for trusted upload session
      tags: *a4
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/sessions/{sessionId}/items/{uploadItemId}/commit:
    put:
      operationId: WebCompanionController_commitUploadItem
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitUploadItemRequestDto"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitUploadItemResponseDto"
      summary: Commit upload item
      tags: *a4
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      - name: uploadItemId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/share/{shareToken}/access:
    get:
      operationId: WebCompanionController_validateShareToken
      parameters:
        - name: userAgent
          required: false
          in: query
          schema: {}
        - name: clientIp
          required: false
          in: query
          schema: {}
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareTokenValidationResponseDto"
      summary: Validate public share token
      tags: *a4
    parameters:
      - name: shareToken
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/share/{shareToken}/assets:
    get:
      operationId: WebCompanionController_getSharedAssets
      parameters:
        - name: limit
          required: false
          in: query
          schema:
            type: number
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedAssetDto"
      summary: Get public shared assets
      tags: *a4
    parameters:
      - name: shareToken
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/share/{shareToken}/book:
    get:
      operationId: WebCompanionController_getSharedBook
      parameters:
        - name: bookId
          required: false
          in: query
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedBookDto"
      summary: Get public shared book metadata
      tags: *a4
    parameters:
      - name: shareToken
        in: path
        required: true
        schema:
          type: string
info:
  title: KidMemory Cloud API
  description: Cloud API for KidMemory - uploads, sharing, and device sync
  version: 1.0.0
  contact: {}
tags:
  - name: health
    description: Health check endpoints
  - name: devices
    description: Device registration and sync
  - name: upload-items
    description: Upload item sync
servers:
  - url: http://127.0.0.1:3002
    description: Cloud API local server
  - url: http://localhost:3002
    description: Cloud API local server (localhost)
components:
  schemas:
    RegisterDeviceRequestDto:
      type: object
      required:
        - machineId
      properties:
        machineId:
          type: string
        deviceName:
          type: string
        platform:
          type: string
    DeviceResponseDto:
      type: object
      required:
        - id
        - machineId
        - lastHeartbeat
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        machineId:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        lastHeartbeat:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    UploadItemResponseDto:
      type: object
      required:
        - id
        - sessionId
        - objectKey
        - fileName
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        sessionId:
          type: string
        childId:
          type: string
        deviceId:
          type: string
        objectKey:
          type: string
        fileName:
          type: string
        fileSize:
          type: string
        mimeType:
          type: string
        status:
          type: string
          enum:
            - pending
            - uploaded
            - synced
            - failed
        uploadedAt:
          type: string
        syncedAt:
          type: string
        errorMessage:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    UpdateSyncStatusRequestDto:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - uploaded
            - synced
            - failed
        syncedAt:
          type: string
        errorMessage:
          type: string
    DirectUploadConfigResponseDto:
      type: object
      required:
        - anonKey
      properties:
        anonKey:
          type: string
    TrustedUploadSessionChildDto:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
        displayName:
          type: string
    ProviderAvailabilityDto:
      type: object
      required:
        - available
      properties:
        available:
          type: boolean
    DirectUploadProvidersDto:
      type: object
      required:
        - lan
        - supabase
      properties:
        lan:
          $ref: "#/components/schemas/ProviderAvailabilityDto"
        supabase:
          $ref: "#/components/schemas/ProviderAvailabilityDto"
    SessionSummaryResponseDto:
      type: object
      required:
        - sessionId
        - status
        - child
        - expiresAt
        - maxItems
        - usedItems
        - providers
      properties:
        sessionId:
          type: string
        status:
          type: string
        child:
          $ref: "#/components/schemas/TrustedUploadSessionChildDto"
        expiresAt:
          type: string
        maxItems:
          type: number
        usedItems:
          type: number
        providers:
          $ref: "#/components/schemas/DirectUploadProvidersDto"
    CreateUploadFileDto:
      type: object
      required:
        - clientFileId
        - filename
        - contentType
        - sizeBytes
      properties:
        clientFileId:
          type: string
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: number
    CreateUploadItemsRequestDto:
      type: object
      required:
        - token
        - files
      properties:
        token:
          type: string
        provider:
          type: string
          enum:
            - lan
            - supabase
        files:
          type: array
          items:
            $ref: "#/components/schemas/CreateUploadFileDto"
    SignedUploadTargetDto:
      type: object
      required:
        - method
        - url
        - headers
      properties:
        method:
          type: string
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        expiresAt:
          type: string
    CreatedUploadItemDto:
      type: object
      required:
        - clientFileId
        - uploadItemId
        - assetId
        - objectKey
        - status
      properties:
        clientFileId:
          type: string
        uploadItemId:
          type: string
        assetId:
          type: string
        objectKey:
          type: string
        status:
          type: string
        signedUpload:
          $ref: "#/components/schemas/SignedUploadTargetDto"
    CreateUploadItemsResponseDto:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatedUploadItemDto"
    CommitUploadItemRequestDto:
      type: object
      required:
        - token
        - objectKey
        - contentType
        - sizeBytes
      properties:
        token:
          type: string
        objectKey:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: number
        uploadToken:
          type: string
        checksumSha256:
          type: string
        metadata:
          type: object
          additionalProperties: true
    CommitUploadItemResponseDto:
      type: object
      required:
        - uploadItemId
        - status
      properties:
        uploadItemId:
          type: string
        status:
          type: string
    ShareTokenAccessDto:
      type: object
      required:
        - id
        - childId
        - resourceType
        - accessType
      properties:
        id:
          type: string
        childId:
          type: string
        resourceType:
          type: string
          enum:
            - specific_book
            - child_assets
        resourceId:
          type: string
        accessType:
          type: string
          enum:
            - read
    ShareTokenValidationResponseDto:
      type: object
      required:
        - isValid
      properties:
        isValid:
          type: boolean
        error:
          type: string
        shareToken:
          $ref: "#/components/schemas/ShareTokenAccessDto"
    SharedAssetDto:
      type: object
      required:
        - id
        - title
        - type
        - createdAt
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        createdAt:
          type: string
    SharedBookDto:
      type: object
      required:
        - id
        - title
        - childId
        - createdAt
        - status
      properties:
        id:
          type: string
        title:
          type: string
        childId:
          type: string
        createdAt:
          type: string
        status:
          type: string
