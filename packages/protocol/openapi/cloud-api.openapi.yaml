openapi: 3.0.0
paths:
  /health:
    get:
      operationId: HealthController_getHealth
      parameters: []
      responses:
        "200":
          description: Service is healthy
      summary: Health check endpoint
      tags: &a1
        - health
  /health/ready:
    get:
      operationId: HealthController_getReadiness
      parameters: []
      responses:
        "200":
          description: Service is ready
      summary: Readiness check endpoint
      tags: *a1
  /config/status:
    get:
      operationId: ConfigController_getStatus
      parameters: []
      responses:
        "200":
          description: Configuration status
      summary: Get configuration status
      tags:
        - config
  /devices/register:
    post:
      operationId: DevicesController_register
      parameters: []
      responses:
        "200":
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponseDto"
        "400":
          description: Invalid request
      summary: Register a device (idempotent by machineId)
      tags: &a2
        - devices
  /devices/{id}/heartbeat:
    put:
      operationId: DevicesController_heartbeat
      parameters: []
      responses:
        "200":
          description: Heartbeat updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponseDto"
        "404":
          description: Device not found
      summary: Update device heartbeat
      tags: *a2
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /devices/{id}:
    get:
      operationId: DevicesController_getDevice
      parameters: []
      responses:
        "200":
          description: Device found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponseDto"
        "404":
          description: Device not found
      summary: Get device by ID
      tags: *a2
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /upload-items/pending-sync:
    get:
      operationId: UploadItemsController_getPendingSync
      parameters:
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            type: number
        - name: limit
          required: false
          in: query
          description: Maximum items to return
          schema:
            type: number
        - name: deviceId
          required: false
          in: query
          description: Filter by device ID
          schema: {}
      responses:
        "200":
          description: Pending items retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadItemResponseDto"
      summary: Get pending sync upload items
      tags: &a3
        - upload-items
  /upload-items/{id}/sync-status:
    put:
      operationId: UploadItemsController_updateSyncStatus
      parameters: []
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadItemResponseDto"
        "400":
          description: Invalid status transition
        "404":
          description: Item not found
      summary: Update upload item sync status
      tags: *a3
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /jobs/pending:
    get:
      operationId: JobsController_getPendingJobs
      parameters:
        - name: limit
          required: false
          in: query
          description: Maximum jobs to return
          schema:
            type: number
        - name: deviceId
          required: false
          in: query
          description: Filter by device ID (null = unassigned)
          schema: {}
      responses:
        "200":
          description: Pending jobs retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobResponseDto"
      summary: Get pending jobs for device
      tags: &a4
        - jobs
  /jobs/{id}/status:
    put:
      operationId: JobsController_updateStatus
      parameters: []
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponseDto"
        "400":
          description: Invalid status transition
        "404":
          description: Job not found
      summary: Update job status
      tags: *a4
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/direct-upload/sessions/{sessionId}/config:
    get:
      operationId: WebCompanionController_getDirectUploadConfig
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectUploadConfigResponseDto"
      summary: Get direct upload config for trusted upload session
      tags: &a5
        - web-companion
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/sessions/{sessionId}:
    get:
      operationId: WebCompanionController_getSessionSummary
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSummaryResponseDto"
      summary: Get trusted upload session summary
      tags: *a5
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/sessions/{sessionId}/items:
    post:
      operationId: WebCompanionController_createUploadItems
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadItemsRequestDto"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUploadItemsResponseDto"
      summary: Create upload items for trusted upload session
      tags: *a5
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/sessions/{sessionId}/items/{uploadItemId}/commit:
    put:
      operationId: WebCompanionController_commitUploadItem
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitUploadItemRequestDto"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitUploadItemResponseDto"
      summary: Commit upload item
      tags: *a5
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      - name: uploadItemId
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/share/{shareToken}/access:
    get:
      operationId: WebCompanionController_validateShareToken
      parameters:
        - name: userAgent
          required: false
          in: query
          schema: {}
        - name: clientIp
          required: false
          in: query
          schema: {}
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareTokenValidationResponseDto"
      summary: Validate public share token
      tags: *a5
    parameters:
      - name: shareToken
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/share/{shareToken}/assets:
    get:
      operationId: WebCompanionController_getSharedAssets
      parameters:
        - name: limit
          required: false
          in: query
          schema:
            type: number
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedAssetDto"
      summary: Get public shared assets
      tags: *a5
    parameters:
      - name: shareToken
        in: path
        required: true
        schema:
          type: string
  /api/web-companion/share/{shareToken}/book:
    get:
      operationId: WebCompanionController_getSharedBook
      parameters:
        - name: bookId
          required: false
          in: query
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedBookDto"
      summary: Get public shared book metadata
      tags: *a5
    parameters:
      - name: shareToken
        in: path
        required: true
        schema:
          type: string
info:
  title: KidMemory Cloud API
  description: Cloud API for KidMemory - uploads, sharing, and device sync
  version: 1.0.0
  contact: {}
tags:
  - name: health
    description: Health check endpoints
  - name: devices
    description: Device registration and sync
  - name: jobs
    description: Job lifecycle and sync
  - name: upload-items
    description: Upload item sync
servers: []
components:
  schemas:
    DeviceResponseDto:
      type: object
      properties:
        id:
          type: string
        machineId:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        lastHeartbeat:
          format: date-time
          type: string
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - machineId
        - lastHeartbeat
        - createdAt
        - updatedAt
    UploadItemResponseDto:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        childId:
          type: string
        deviceId:
          type: string
        objectKey:
          type: string
        fileName:
          type: string
        fileSize:
          type: string
        mimeType:
          type: string
        status:
          type: string
        uploadedAt:
          format: date-time
          type: string
        syncedAt:
          format: date-time
          type: string
        errorMessage:
          type: string
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - sessionId
        - childId
        - objectKey
        - fileName
        - status
        - createdAt
        - updatedAt
    JobResponseDto:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        type:
          type: string
          description: Job type
          enum:
            - book_generation
            - asset_processing
            - export_pdf
            - export_long_image
        payload:
          type: object
          description: Job payload (JSON)
        status:
          type: string
          description: Job status
          enum:
            - pending
            - claimed
            - processing
            - completed
            - failed
        priority:
          type: number
          description: Priority (higher = more urgent)
          default: 0
        claimedAt:
          format: date-time
          type: string
        completedAt:
          format: date-time
          type: string
        errorMessage:
          type: string
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - type
        - payload
        - status
        - priority
        - createdAt
        - updatedAt
    DirectUploadConfigResponseDto:
      type: object
      properties:
        anonKey:
          type: string
      required:
        - anonKey
    SessionSummaryResponseDto:
      type: object
      properties:
        sessionId:
          type: string
        status:
          type: string
        child:
          type: object
          additionalProperties: true
        expiresAt:
          type: string
        maxItems:
          type: number
        usedItems:
          type: number
        providers:
          type: object
          additionalProperties: true
      required:
        - sessionId
        - status
        - child
        - expiresAt
        - maxItems
        - usedItems
        - providers
    CreateUploadFileDto:
      type: object
      properties:
        clientFileId:
          type: string
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: number
      required:
        - clientFileId
        - filename
        - contentType
        - sizeBytes
    CreateUploadItemsRequestDto:
      type: object
      properties:
        token:
          type: string
        provider:
          type: string
          enum:
            - lan
            - supabase
        files:
          type: array
          items:
            $ref: "#/components/schemas/CreateUploadFileDto"
      required:
        - token
        - provider
        - files
    CreatedUploadItemDto:
      type: object
      properties:
        clientFileId:
          type: string
        uploadItemId:
          type: string
        assetId:
          type: string
        objectKey:
          type: string
        status:
          type: string
      required:
        - clientFileId
        - uploadItemId
        - assetId
        - objectKey
        - status
    CreateUploadItemsResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatedUploadItemDto"
      required:
        - items
    CommitUploadItemRequestDto:
      type: object
      properties:
        token:
          type: string
        objectKey:
          type: string
        sizeBytes:
          type: number
        contentType:
          type: string
      required:
        - token
        - objectKey
        - sizeBytes
        - contentType
    CommitUploadItemResponseDto:
      type: object
      properties:
        uploadItemId:
          type: string
        status:
          type: string
      required:
        - uploadItemId
        - status
    ShareTokenValidationResponseDto:
      type: object
      properties:
        isValid:
          type: boolean
        shareToken:
          type: object
          additionalProperties: true
        error:
          type: string
      required:
        - isValid
    SharedAssetDto:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - type
        - createdAt
    SharedBookDto:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        childId:
          type: string
        createdAt:
          type: string
        status:
          type: string
      required:
        - id
        - title
        - childId
        - createdAt
        - status
