syntax = "proto3";

package kidmemory.v1;

enum UploadItemStatus {
  UPLOAD_ITEM_STATUS_UNSPECIFIED = 0;
  UPLOAD_ITEM_STATUS_PENDING = 1;
  UPLOAD_ITEM_STATUS_UPLOADED = 2;
  UPLOAD_ITEM_STATUS_COMMITTED = 3;
  UPLOAD_ITEM_STATUS_SYNCED = 4;
  UPLOAD_ITEM_STATUS_FAILED = 5;
}

message UploadItem {
  string upload_item_id = 1;
  string session_id = 2;
  string device_id = 3;
  string object_key = 4;
  string file_name = 5;
  UploadItemStatus status = 6;
  string cloud_file_url = 7;
  string error_message = 8;
  int64 created_at = 9;
}

message PendingUploadItemsRequest {
  string device_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message PendingUploadItemsResponse {
  repeated UploadItem items = 1;
}

message UpdateUploadItemStatusRequest {
  string upload_item_id = 1;
  UploadItemStatus status = 2;
  string error_message = 3;
}
