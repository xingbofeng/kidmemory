name: Deploy to Tencent Cloud

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: deploy cloud-api with docker compose
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          script: |
            set -euo pipefail
            PROJECT_PATH="${{ secrets.TENCENT_PROJECT_PATH || '/root/kidmemory' }}"
            COMPOSE_FILE="$PROJECT_PATH/deploy/tencent/cloud-api.compose.yml"
            DEPLOY_ENV_DIR="$PROJECT_PATH/.deploy"
            DEPLOY_ENV_FILE="$DEPLOY_ENV_DIR/cloud-api.env"
            TENCENT_PUBLIC_PORT="${{ secrets.TENCENT_PUBLIC_PORT || 3000 }}"

            run_as_root() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
              elif command -v sudo >/dev/null 2>&1; then
                sudo "$@"
              else
                echo "root privileges are required to bootstrap Docker Engine"
                exit 127
              fi
            }

            install_docker_engine() {
              echo "Docker Engine or Compose plugin is missing; bootstrapping Docker packages"
              if command -v apt-get >/dev/null 2>&1; then
                . /etc/os-release
                if [ "${ID:-}" != "ubuntu" ] && [ "${ID:-}" != "debian" ]; then
                  echo "apt-get host is not Ubuntu/Debian; unsupported Docker bootstrap target: ${ID:-unknown}"
                  exit 127
                fi
                docker_codename="${VERSION_CODENAME:-${UBUNTU_CODENAME:-}}"
                if [ -z "$docker_codename" ]; then
                  echo "cannot detect Ubuntu/Debian codename for Docker apt repository"
                  exit 127
                fi
                run_as_root apt-get update
                run_as_root apt-get install -y ca-certificates curl
                run_as_root install -m 0755 -d /etc/apt/keyrings
                curl -fsSL "https://download.docker.com/linux/${ID}/gpg" -o /tmp/docker.asc
                run_as_root install -m 0644 /tmp/docker.asc /etc/apt/keyrings/docker.asc
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/${ID} ${docker_codename} stable" \
                  | run_as_root tee /etc/apt/sources.list.d/docker.list >/dev/null
                run_as_root apt-get update
                run_as_root apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              elif command -v dnf >/dev/null 2>&1; then
                run_as_root dnf install -y dnf-plugins-core
                run_as_root dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
                run_as_root dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              elif command -v yum >/dev/null 2>&1; then
                run_as_root yum install -y yum-utils
                run_as_root yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
                run_as_root yum install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              else
                echo "no supported package manager found for Docker Engine bootstrap"
                exit 127
              fi

              if command -v systemctl >/dev/null 2>&1; then
                run_as_root systemctl enable --now docker
              elif command -v service >/dev/null 2>&1; then
                run_as_root service docker start
              fi
            }

            open_public_port() {
              if command -v ufw >/dev/null 2>&1 && ufw status | grep -qi active; then
                run_as_root ufw allow "$TENCENT_PUBLIC_PORT/tcp"
              fi

              if command -v firewall-cmd >/dev/null 2>&1 && firewall-cmd --state >/dev/null 2>&1; then
                run_as_root firewall-cmd --permanent --add-port="$TENCENT_PUBLIC_PORT/tcp"
                run_as_root firewall-cmd --reload
              fi
            }

            if ! command -v docker >/dev/null 2>&1 || ! docker compose version >/dev/null 2>&1; then
              install_docker_engine
            fi

            docker --version
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose plugin not found; install Docker Compose v2 on the Tencent Cloud host before deployment"
              exit 127
            fi
            docker compose version

            cd "$PROJECT_PATH"
            git fetch origin main && git reset --hard origin/main

            if [ -f "$PROJECT_PATH/.env" ]; then
              set -a && source "$PROJECT_PATH/.env" && set +a
            fi
            if [ -f "$PROJECT_PATH/packages/cloud-api/.env" ]; then
              set -a && source "$PROJECT_PATH/packages/cloud-api/.env" && set +a
            fi

            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL is empty; expected in $PROJECT_PATH/.env or $PROJECT_PATH/packages/cloud-api/.env"
              exit 1
            fi

            mkdir -p "$DEPLOY_ENV_DIR"
            {
              printf 'NODE_ENV=production\n'
              printf 'CLOUD_API_HOST=0.0.0.0\n'
              printf 'CLOUD_API_PORT=%s\n' "$TENCENT_PUBLIC_PORT"
              for key in \
                DATABASE_URL \
                ALLOWED_ORIGINS \
                JWT_SECRET \
                COS_BUCKET \
                COS_REGION \
                COS_SECRET_ID \
                COS_SECRET_KEY \
                COS_SIGNED_URL_TTL_SECONDS; do
                value="$(printenv "$key" || true)"
                if [ -n "$value" ]; then
                  printf '%s=%s\n' "$key" "$value"
                fi
              done
            } > "$DEPLOY_ENV_FILE"
            chmod 600 "$DEPLOY_ENV_FILE"

            docker compose -f "$COMPOSE_FILE" build cloud-api
            docker compose -f "$COMPOSE_FILE" run --rm cloud-api npx prisma migrate deploy
            docker compose -f "$COMPOSE_FILE" up -d --remove-orphans cloud-api
            open_public_port
            curl --retry 10 --retry-all-errors --retry-delay 2 -fsS "http://127.0.0.1:$TENCENT_PUBLIC_PORT/health" >/dev/null

      - name: Public smoke from GitHub runner
        env:
          TENCENT_SMOKE_BASE_URL: ${{ secrets.TENCENT_SMOKE_BASE_URL }}
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_PUBLIC_PORT: ${{ secrets.TENCENT_PUBLIC_PORT || 3000 }}
        run: |
          set -euo pipefail
          if [ -n "$TENCENT_SMOKE_BASE_URL" ]; then
            public_smoke_base_url="${TENCENT_SMOKE_BASE_URL%/}"
          else
            public_smoke_base_url="http://${TENCENT_HOST}:${TENCENT_PUBLIC_PORT}"
          fi

          curl --retry 5 --retry-all-errors --retry-delay 2 -fsS "$public_smoke_base_url/health" >/dev/null
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsS "$public_smoke_base_url/docs/openapi.json" >/dev/null
