name: Deploy to Tencent Cloud

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: deploy cloud-api with docker compose
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          script: |
            set -euo pipefail
            PROJECT_PATH="${{ secrets.TENCENT_PROJECT_PATH || '/root/kidmemory' }}"
            COMPOSE_FILE="$PROJECT_PATH/deploy/tencent/cloud-api.compose.yml"
            DEPLOY_ENV_DIR="$PROJECT_PATH/.deploy"
            DEPLOY_ENV_FILE="$DEPLOY_ENV_DIR/cloud-api.env"

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker not found; install Docker Engine on the Tencent Cloud host before deployment"
              exit 127
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose plugin not found; install Docker Compose v2 on the Tencent Cloud host before deployment"
              exit 127
            fi

            cd "$PROJECT_PATH"
            git fetch origin main && git reset --hard origin/main

            if [ -f "$PROJECT_PATH/.env" ]; then
              set -a && source "$PROJECT_PATH/.env" && set +a
            fi
            if [ -f "$PROJECT_PATH/packages/cloud-api/.env" ]; then
              set -a && source "$PROJECT_PATH/packages/cloud-api/.env" && set +a
            fi

            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL is empty; expected in $PROJECT_PATH/.env or $PROJECT_PATH/packages/cloud-api/.env"
              exit 1
            fi

            mkdir -p "$DEPLOY_ENV_DIR"
            {
              printf 'NODE_ENV=production\n'
              printf 'CLOUD_API_HOST=0.0.0.0\n'
              printf 'CLOUD_API_PORT=3000\n'
              for key in \
                DATABASE_URL \
                ALLOWED_ORIGINS \
                JWT_SECRET \
                COS_BUCKET \
                COS_REGION \
                COS_SECRET_ID \
                COS_SECRET_KEY \
                COS_SIGNED_URL_TTL_SECONDS; do
                value="$(printenv "$key" || true)"
                if [ -n "$value" ]; then
                  printf '%s=%s\n' "$key" "$value"
                fi
              done
            } > "$DEPLOY_ENV_FILE"
            chmod 600 "$DEPLOY_ENV_FILE"

            docker compose -f "$COMPOSE_FILE" build cloud-api
            docker compose -f "$COMPOSE_FILE" run --rm cloud-api npx prisma migrate deploy
            docker compose -f "$COMPOSE_FILE" up -d --remove-orphans cloud-api

            # Optional smoke test
            if [ -n "${{ secrets.TENCENT_SMOKE_BASE_URL }}" ]; then
              curl -fsS "${{ secrets.TENCENT_SMOKE_BASE_URL }}/health" >/dev/null
              curl -fsS "${{ secrets.TENCENT_SMOKE_BASE_URL }}/docs/openapi.json" >/dev/null
            fi
