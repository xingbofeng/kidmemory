name: Deploy to Tencent Cloud

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: deploy to lighthouse
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        env:
          TENCENT_DATABASE_URL: ${{ secrets.TENCENT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUD_API_DATABASE_URL: ${{ secrets.CLOUD_API_DATABASE_URL }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: ${{ secrets.TENCENT_PORT || 22 }}
          envs: TENCENT_DATABASE_URL,DATABASE_URL,CLOUD_API_DATABASE_URL
          script: |
            set -e
            PROJECT_PATH="${{ secrets.TENCENT_PROJECT_PATH || '/root/kidmemory' }}"

            # Ensure Node.js toolchain is available in non-interactive SSH shell
            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              export NVM_DIR="$HOME/.nvm"
              if [ -s "$NVM_DIR/nvm.sh" ]; then
                . "$NVM_DIR/nvm.sh"
                nvm use --lts >/dev/null 2>&1 || true
              fi
            fi

            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              if [ -x "/usr/local/bin/node" ] || [ -x "/usr/local/bin/npm" ]; then
                export PATH="/usr/local/bin:$PATH"
              elif [ -x "/opt/homebrew/bin/node" ] || [ -x "/opt/homebrew/bin/npm" ]; then
                export PATH="/opt/homebrew/bin:$PATH"
              fi
            fi

            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y curl ca-certificates gnupg
                install -d -m 0755 /etc/apt/keyrings
                curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
                echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
                apt-get update
                apt-get install -y nodejs
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y nodejs
              elif command -v yum >/dev/null 2>&1; then
                yum install -y nodejs
              elif command -v apk >/dev/null 2>&1; then
                apk add --no-cache nodejs npm
              fi
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm not found in PATH after bootstrap; aborting deploy"
              exit 127
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "node not found in PATH after bootstrap; aborting deploy"
              exit 127
            fi

            cd "$PROJECT_PATH"
            git fetch origin main && git reset --hard origin/main

            # Cloud API
            cd "$PROJECT_PATH/packages/cloud-api"
            npm ci --omit=dev
            npm run prisma:generate
            if [ -f "$PROJECT_PATH/.env" ]; then
              set -a && source "$PROJECT_PATH/.env" && set +a
            fi
            if [ -f ".env" ]; then
              set -a && source ".env" && set +a
            fi
            DATABASE_URL="${DATABASE_URL:-$TENCENT_DATABASE_URL}"
            DATABASE_URL="${DATABASE_URL:-$CLOUD_API_DATABASE_URL}"
            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL is empty; expected in $PROJECT_PATH/.env or $PROJECT_PATH/packages/cloud-api/.env"
              exit 1
            fi
            DATABASE_URL="$DATABASE_URL" npx prisma migrate deploy
            npm run build:prod

            # Reload services
            PROJECT_PATH="$PROJECT_PATH" pm2 reload all
            pm2 save

            # Optional smoke test
            if [ -n "${{ secrets.TENCENT_SMOKE_BASE_URL }}" ]; then
              curl -fsS "${{ secrets.TENCENT_SMOKE_BASE_URL }}/health" >/dev/null
              curl -fsS "${{ secrets.TENCENT_SMOKE_BASE_URL }}/docs/openapi.json" >/dev/null
            fi
