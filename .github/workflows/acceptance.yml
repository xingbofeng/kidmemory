name: Acceptance Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  protocol:
    name: protocol check/build/test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/protocol
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/protocol/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm test
      - run: npm run gen:ts
      - run: npm run gen:dart
      - run: git diff --exit-code packages/protocol/generated

  sidecar:
    name: sidecar lint/test/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sidecar/package-lock.json

      - name: Start PostgreSQL with pgvector
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=kidmemory_test \
            -p 5432:5432 \
            pgvector/pgvector:pg16
          timeout 30 bash -c 'until docker exec postgres-test pg_isready -U postgres; do sleep 1; done'

      - run: npm ci
      - run: npm run prisma:generate
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kidmemory_test
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: kidmemory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kidmemory_test
      - run: npm run build
      - name: Stop PostgreSQL
        if: always()
        run: docker stop postgres-test && docker rm postgres-test

  cloud-api:
    name: cloud-api lint/test/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cloud-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/cloud-api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run build

  web:
    name: web lint/test/type-check/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run type-check
      - run: npm run build

  desktop:
    name: desktop analyze/test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - name: Run unit and widget tests (excluding visual goldens)
        run: |
          set -euo pipefail
          mapfile -t TEST_FILES < <(find test -name '*_test.dart' -not -name 'visual_golden_test.dart')
          flutter test "${TEST_FILES[@]}"
        shell: bash

  acceptance:
    name: acceptance contract/integration/smoke
    runs-on: ubuntu-latest
    needs:
      - protocol
      - sidecar
      - cloud-api
      - web
      - desktop
    defaults:
      run:
        working-directory: packages/sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sidecar/package-lock.json

      - name: Start PostgreSQL with pgvector
        run: |
          docker run -d \
            --name postgres-acceptance \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=kidmemory_test \
            -p 5432:5432 \
            pgvector/pgvector:pg16
          timeout 30 bash -c 'until docker exec postgres-acceptance pg_isready -U postgres; do sleep 1; done'

      - run: npm ci
      - run: npm run prisma:generate
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kidmemory_test

      - name: Contract tests
        run: npm run test:contracts
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: kidmemory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kidmemory_test

      - name: Integration tests
        run: npm run test:integration
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: kidmemory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kidmemory_test

      - name: Smoke tests
        run: npx tsx --test tests/http/router.smoke.test.ts
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: kidmemory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kidmemory_test

      - name: Stop PostgreSQL
        if: always()
        run: docker stop postgres-acceptance && docker rm postgres-acceptance
