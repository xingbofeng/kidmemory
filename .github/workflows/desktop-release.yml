name: Desktop Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: build macOS artifact and prerelease
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sidecar/package-lock.json

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare bundled PostgreSQL runtime
        run: |
          set -euo pipefail
          if ! brew list --versions postgresql@16 >/dev/null 2>&1 || ! brew list --versions pgvector >/dev/null 2>&1; then
            brew install postgresql@16 pgvector
          fi

          PG_PREFIX="$(brew --prefix postgresql@16)"
          PGVECTOR_PREFIX="$(brew --prefix pgvector)"
          RUNTIME_DIR="third_party/postgres/macos"

          rm -rf "$RUNTIME_DIR"
          mkdir -p "$RUNTIME_DIR/bin" "$RUNTIME_DIR/lib" "$RUNTIME_DIR/share"
          rsync -a "$PG_PREFIX/bin/" "$RUNTIME_DIR/bin/"
          rsync -a "$PG_PREFIX/lib/" "$RUNTIME_DIR/lib/"
          rsync -a "$PG_PREFIX/share/" "$RUNTIME_DIR/share/"

          mkdir -p "$RUNTIME_DIR/share/extension" "$RUNTIME_DIR/share/postgresql@16/extension"
          for extension_dir in \
            "$PGVECTOR_PREFIX/share/postgresql@16/extension" \
            "$PGVECTOR_PREFIX/share/postgresql/extension" \
            "$PG_PREFIX/share/postgresql@16/extension" \
            "$PG_PREFIX/share/extension"; do
            if [ -d "$extension_dir" ]; then
              rsync -a "$extension_dir"/vector*.sql "$RUNTIME_DIR/share/extension/" 2>/dev/null || true
              rsync -a "$extension_dir"/vector.control "$RUNTIME_DIR/share/extension/" 2>/dev/null || true
            fi
          done
          rsync -a "$RUNTIME_DIR/share/extension/" "$RUNTIME_DIR/share/postgresql@16/extension/"

          mkdir -p "$RUNTIME_DIR/lib/postgresql" "$RUNTIME_DIR/lib/postgresql@16"
          for vector_lib in \
            "$PGVECTOR_PREFIX/lib/vector.dylib" \
            "$PGVECTOR_PREFIX/lib/postgresql/vector.dylib" \
            "$PGVECTOR_PREFIX/lib/postgresql@16/vector.dylib" \
            "$PG_PREFIX/lib/vector.dylib" \
            "$PG_PREFIX/lib/postgresql/vector.dylib" \
            "$PG_PREFIX/lib/postgresql@16/vector.dylib"; do
            if [ -f "$vector_lib" ]; then
              cp "$vector_lib" "$RUNTIME_DIR/lib/vector.dylib"
              cp "$vector_lib" "$RUNTIME_DIR/lib/postgresql/vector.dylib"
              cp "$vector_lib" "$RUNTIME_DIR/lib/postgresql@16/vector.dylib"
              break
            fi
          done

          test -x "$RUNTIME_DIR/bin/postgres"
          test -f "$RUNTIME_DIR/lib/vector.dylib"
          test -f "$RUNTIME_DIR/share/extension/vector.control"

      - name: Build sidecar dist
        working-directory: packages/sidecar
        run: |
          npm ci
          npm run prisma:generate
          npm run build:prod

      - name: Build desktop app
        working-directory: packages/desktop
        run: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter build macos --release

      - name: Bundle sidecar into .app
        run: |
          set -euo pipefail
          APP_PATH="$(find packages/desktop/build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "${APP_PATH}" ]; then
            echo "No macOS .app artifact found"
            exit 1
          fi
          RESOURCE_DIR="${APP_PATH}/Contents/Resources/sidecar"
          mkdir -p "${RESOURCE_DIR}"
          cp -R packages/sidecar/dist "${RESOURCE_DIR}/dist"
          cp packages/sidecar/package.json "${RESOURCE_DIR}/package.json"

      - name: Archive artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          APP_PATH="$(find packages/desktop/build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n 1)"
          APP_NAME="$(basename "${APP_PATH}")"
          tar -czf "dist/KidMemory-macos-arm64-unsigned.tar.gz" -C "$(dirname "${APP_PATH}")" "${APP_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-unsigned
          path: dist/KidMemory-macos-arm64-unsigned.tar.gz

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-alpha-latest
          name: KidMemory Desktop Alpha
          prerelease: true
          files: dist/KidMemory-macos-arm64-unsigned.tar.gz
          body: |
            Unsigned macOS alpha artifact built by CI.
            Use for internal validation only.
